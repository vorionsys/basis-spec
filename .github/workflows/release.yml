# SPDX-License-Identifier: Apache-2.0
# Stable `latest` release for @vorionsys/* packages in this monorepo, published
# tokenlessly via npm trusted publishing (OIDC) with a Sigstore provenance
# attestation — no NPM_TOKEN is stored anywhere.
#
# Tag pushes (v*) always publish from packages/basis.
# workflow_dispatch lets you target any workspace package by directory name.
#
# Prerequisite: each npm package needs its own trusted publisher binding:
#   npmjs.com -> package Settings -> Publishing access -> GitHub Actions:
#   org vorionsys, repo basis-spec, workflow release.yml, environment blank
#
# Packages + npm names:
#   basis             -> @vorionsys/basis-spec
#   basis-conformance -> @vorionsys/basis-spec-conformance
#   basis-scorer      -> @vorionsys/basis-scorer
#   basis-registry    -> @vorionsys/basis-registry

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      package:
        description: Workspace package directory under packages/ to publish
        required: true
        type: choice
        default: basis
        options:
          - basis
          - basis-conformance
          - basis-scorer
          - basis-registry

permissions:
  contents: read
  id-token: write   # for npm provenance (tokenless OIDC trusted publishing)

jobs:
  publish:
    name: Build, gate, publish packages/${{ github.event_name == 'workflow_dispatch' && inputs.package || 'basis' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PACKAGE_DIR: packages/${{ github.event_name == 'workflow_dispatch' && inputs.package || 'basis' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install (clean)
        run: npm ci

      - name: Gates (typecheck + build; tests run if present)
        run: |
          npm run typecheck --workspaces --if-present
          npm run build --workspaces --if-present
          npm run test --workspaces --if-present

      - name: Verify package contents
        run: |
          cd "$PACKAGE_DIR"
          npm pack --dry-run

      - name: Publish (tokenless OIDC, provenance)
        run: |
          cd "$PACKAGE_DIR"
          npm publish --provenance --access public
